name: Verified Truth Pyramid Prototype

on:
  pull_request:
  push:
    branches:
      - main
      - feat/verified-truth-pyramid-prototype

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Lint
        run: ruff check app tests

      - name: Test
        run: pytest -q
