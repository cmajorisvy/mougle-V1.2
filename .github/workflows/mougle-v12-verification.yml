name: Mougle V1.2 verification

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  security-events: read

jobs:
  verify:
    name: architecture verification artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate V1.2 verification artifacts
        run: npm run verify:mougle-v12:ci
      - name: Stage boundary check
        run: npm run check:stage-boundaries
      - name: Redacted secret scan
        run: npm run check:secrets:redacted
      - name: Upload verification artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mougle-v12-verification-${{ github.sha }}
          path: |
            artifacts/mougle-v1.2/**
            docs/mougle-v1.2-*.md
            docs/diagrams/*.mmd
          retention-days: 14
