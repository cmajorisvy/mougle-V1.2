base_bias: -0.1
weights:
  source_reliability: 0.9
  provenance_completeness: 0.7
  retrieval_support: 0.8
  contradiction_pressure: 0.9
  temporal_freshness: 0.6
  numeric_consistency: 0.7
  macro_consistency: 1.0
  micro_evidence: 1.1
  external_judge: 0.4
  hard_mesh_structural: 1.0
pairwise:
  source_reliability|provenance_completeness: 0.08
  retrieval_support|micro_evidence: 0.10
  contradiction_pressure|macro_consistency: -0.06
lambda_graph: 0.35
lambda_hard_mesh: 0.8
mu_contradiction: 0.8
mu_uncertainty: 0.7
mu_drift: 0.6
mu_out_of_domain: 1.0
publish:
  tvs_threshold: 65.0
  epsilon_disagreement: 0.3
  uncertainty_max: 0.45
  allow_stage7_provisional_publish: false
tmi:
  alpha: 0.25
  beta: 0.2
  gamma: 0.2
  delta: 0.2
  eta: 0.15
calibration:
  mode: identity
freshness:
  default_window_days: 365
source_reliability:
  default: 0.5
external_verifier:
  enabled: false
  stub_provider: mock
query_tank:
  enabled: true
hard_mesh:
  enabled: true
  tau: 1.4
  min_samples_for_clustering: 3
  thresholds:
    pass_to_stage_5: 0.85
    send_to_stage_7: 0.60
    query_tank_below: 0.60
    hdbscan_high_purity_probability: 0.85
    hdbscan_borderline_probability: 0.60
  weights:
    hdbscan: 1.0
    mini_batch_kmeans: 0.7
    birch: 0.6
    graph_refinement: 0.9
    consensus: 1.0
    classical_ml: 0.8
    external: 0.5
    rules: 1.0
  penalties:
    contradiction: 1.0
    noise: 0.8
    stale: 0.8
    source_conflict: 1.0
    out_of_domain: 1.0
    uncertainty: 0.7
  algorithms:
    birch:
      threshold: 0.5
      branching_factor: 50
    mini_batch_kmeans:
      n_clusters_default: 8
      batch_size: 1024
    hdbscan:
      min_cluster_size: 5
      min_samples: 5
    optics:
      min_samples: 5
      xi: 0.05
    spectral:
      n_neighbors: 5
    agglomerative:
      n_neighbors: 5
  classical_ml:
    min_samples: 4
    min_calibration_samples: 20
council_socket_fabric:
  enabled: true
  no_bypass_targets:
    - stage_1
    - stage_4
    - truth_crown
    - knowledge_of_purity_and_wisdom
  high_risk_councils:
    - legal_management
    - financial_management
  high_risk_actions:
    - publish
    - legal_update
    - charge
    - payout
    - score_to_money
  default_route: stage_7_then_stage_6
  low_risk_route: stage_6_hard_mesh
persistent_topological_engine:
  enabled: true
  stage_anchor: stage_4_stage_5_stage_6_core
  drift_threshold: 0.7
  hot_path: lightweight_state_delta
  cold_path: audit_replay_and_topology_recompute
agent_micro_pyramid:
  enabled: true
  allowed_action_classes:
    - proceed_local
    - ask_user
    - simulate_more
    - escalate_to_council
    - block
    - archive
  forbidden_action_classes:
    - publish_truth
  readiness_thresholds:
    proceed_local: 0.75
    ask_user: 0.55
    simulate_more: 0.35
  high_risk_escalation:
    legal: true
    financial: true
    public_truth: true
signal_culture:
  enabled: true
  main_engine_priority_threshold: 0.18
  agent_wake_priority_threshold: 0.12
  default_decay: 1.0
  load_reduction_formula: "1 - EventsSentToMainEngine / TotalEventsReceived"
  not_truth_engine: true
archive_reuse:
  enabled: true
  default_archive_timestamp: "20260529-1150"
  direct_archive_imports_allowed: false
  block_secret_risk_levels:
    - P0
  target_layers:
    - cross_cutting
    - stage5_micro_pyramid
    - stage6_boundary
    - stage7_foundation
    - admin_governance
    - reference_only
    - archive_only
  micro_pyramid_bands:
    - personal_context
    - professional_business
    - community
    - knowledge_contribution
    - risk_safety
    - reputation_gluon
    - marketplace_product
    - debate_podcast
