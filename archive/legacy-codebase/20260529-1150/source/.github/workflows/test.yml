name: test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: safe local checks (typecheck + local tests + build)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npx tsc --noEmit

      - name: Safety lint
        run: node scripts/safety-lint.cjs

      - name: Run safe local tests
        run: npm run test:local

      - name: R10 perf budget
        run: node scripts/r10-perf-budget-check.mjs

      - name: Build
        run: npm run build
